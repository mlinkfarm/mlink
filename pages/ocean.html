<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Ocean Holder - Address Fish</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* 🌊 海底背景 */
body {
  background-image: url("https://images.unsplash.com/photo-1544551763-46a013bb70d5");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 🐟 / 🐋 角色 */
.fish {
  position: absolute;
  color: white;
  text-align: center;
  pointer-events: none;
  transition: transform linear 3s;
  will-change: transform;
  text-shadow: 0 0 6px rgba(0,0,0,0.6);
}

/* 🐋 鯨魚發光 */
.whale {
  text-shadow:
    0 0 8px #00ffff,
    0 0 14px #00ffff;
}
</style>
</head>

<body>
<div id="ocean"></div>

<script>
const CONTRACT = "0xd5A5eB143e911736333ae9A92A43F7e4f8b3a3d2";
const APIKEY = "VZGTN66MH2E76D5V5JU56YSI6JDWGYYPQF";

const ADDRESSES = [
  "0xb51ff2F65B935142aab32aBEfa1C0E29A4161D31",
  "0xfe97278082697122adb4271e913c7847a3E68E8C",
  "0x4B4958c4A9bc5D0a99f046946D66D85Ce75E2d68",
  "0xe8dE3766543BD3835613c7B1aD91aB4Bc281D7ed",
  "0xB9D3E79561eC41463348711813713959C52Dd221",
  "0x2C7578f18a994eC057522e54C28f71CEFB76884e",
  "0x2346b80A4E5F5101Bac9589e517d9eDa3bD07E32",
  "0x0956e702365D6ee8fD59fb47774Dd56f1aF746f9"
];

const ocean = document.getElementById("ocean");
let fishes = [];

/* 🐟 建立 ADDRESS 生物 */
function createFish(address, balance) {
  const div = document.createElement("div");
  div.className = "fish";

  // ✅ 字體大小規則
  const fontSize = Math.max(12, balance / 13888);

  // ✅ 圖示規則
  let emoji = "🐟";
  if (balance >= 500000) {
    emoji = "🐋";
    div.classList.add("whale");
  }

  // ✅ ADDRESS 只顯示 7 個字
  const shortAddr = address.slice(0, 7);

  div.innerHTML = `
    <div style="font-size:${fontSize}px">${emoji}</div>
    <div style="font-size:11px">${shortAddr}</div>
  `;

  ocean.appendChild(div);
  fishes.push(div);
}

/* 🌊 游動 */
function animate() {
  fishes.forEach(div => {
    const x = Math.random() * (window.innerWidth - 200);
    const y = Math.random() * (window.innerHeight - 80);
    div.style.transform = `translate(${x}px, ${y}px)`;
  });
}
setInterval(animate, 3000);

/* 🔢 查 balance */
async function getBalance(address) {
  const url =
    `https://api.etherscan.io/v2/api?chainid=1` +
    `&module=account&action=tokenbalance` +
    `&contractaddress=${CONTRACT}` +
    `&address=${address}&tag=latest&apikey=${APIKEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.status !== "1") return 0;
    return Number(data.result) / 1e18;
  } catch {
    return 0;
  }
}

/* 🚀 載入 */
async function load() {
  ocean.innerHTML = "";
  fishes = [];

  for (const addr of ADDRESSES) {
    const balance = await getBalance(addr);
    createFish(addr, balance);
    await new Promise(r => setTimeout(r, 300));
  }
}

setInterval(load, 30000);
load();
</script>
</body>
</html>
