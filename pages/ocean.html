<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Ocean Holder - Text Only</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
}

/* ✅ 真正滿框背景 */
body {
  background-image: url("https://images.unsplash.com/photo-1544551763-46a013bb70d5");
  background-size: cover;          /* 關鍵 */
  background-position: center;     /* 置中 */
  background-repeat: no-repeat;
  background-attachment: fixed;    /* 手機/PC一致 */
}

.address {
  position: absolute;
  transition: transform 2s linear, font-size 0.3s;
  will-change: transform, font-size;
  color: white;
  text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="ocean"></div>

<script>
const CONTRACT = "0xd5A5eB143e911736333ae9A92A43F7e4f8b3a3d2";
const APIKEY = "VZGTN66MH2E76D5V5JU56YSI6JDWGYYPQF";

const ADDRESSES = [
  "0xb51ff2F65B935142aab32aBEfa1C0E29A4161D31",
  "0xfe97278082697122adb4271e913c7847a3E68E8C",
  "0x4B4958c4A9bc5D0a99f046946D66D85Ce75E2d68",
  "0xe8dE3766543BD3835613c7B1aD91aB4Bc281D7ed",
  "0xB9D3E79561eC41463348711813713959C52Dd221",
  "0x2C7578f18a994eC057522e54C28f71CEFB76884e",
  "0x2346b80A4E5F5101Bac9589e517d9eDa3bD07E32",
  "0x0956e702365D6ee8fD59fb47774Dd56f1aF746f9"
];

const ocean = document.getElementById("ocean");
let items = [];

// 建立文字
function createAddress(addr, balance){
  const div = document.createElement("div");
  div.className = "address";
  div.innerText = addr.slice(0,10) + "...";
  // 字體大小依 balance
  const fontSize = Math.max(12, balance/13888);
  div.style.fontSize = fontSize + "px";

  ocean.appendChild(div);
  items.push({div, fontSize});
}

// 隨機游動
function animate(){
  items.forEach(obj=>{
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 20);
    obj.div.style.transform = `translate(${x}px, ${y}px)`;
  });
}
setInterval(animate, 3000);

// 查 balance
async function getBalance(address){
  const url = `https://api.etherscan.io/v2/api?chainid=1&module=account&action=tokenbalance&contractaddress=${CONTRACT}&address=${address}&tag=latest&apikey=${APIKEY}`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    if(data.status !== "1") return 0;
    return Number(BigInt(data.result))/1e18;
  } catch(e){
    return 0;
  }
}

// 載入地址
async function load(){
  ocean.innerHTML = "";
  items = [];
  for(const addr of ADDRESSES){
    const balance = await getBalance(addr);
    createAddress(addr, balance);
    await new Promise(r=>setTimeout(r,350));
  }
}

// 即時刷新
setInterval(load, 30000);

// 初始
load();

</script>
</body>
</html>
