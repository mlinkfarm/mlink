<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>小瑪莉 BAR 台模擬</title>
<style>
  body {
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Courier New', monospace;
  }

  .machine {
    width: 400px;
    height: 300px;
    background: linear-gradient(to bottom, #222 0%, #000 100%);
    border: 5px solid #555;
    border-radius: 20px;
    box-shadow: 0 0 30px #f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .reels {
    display: flex;
    justify-content: space-around;
    width: 100%;
    margin-bottom: 20px;
  }

  .reel {
    width: 80px;
    height: 80px;
    background-color: #000;
    border: 3px solid #0ff;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    color: #ff0;
  }

  .spin-btn {
    padding: 10px 20px;
    font-size: 18px;
    background-color: #f00;
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
  }

</style>
</head>
<body>

<div class="machine">
  <div class="reels">
    <div class="reel" id="reel1">🍒</div>
    <div class="reel" id="reel2">🍋</div>
    <div class="reel" id="reel3">🔔</div>
  </div>
  <button class="spin-btn" onclick="spin()">拉桿！</button>
</div>

<script>
const emojis = ["🍒","🍋","🔔","🍉","⭐","7️⃣"];
const reels = [
  document.getElementById("reel1"),
  document.getElementById("reel2"),
  document.getElementById("reel3")
];

function spin() {
  // 轉輪動畫效果
  let spins = 20; // 轉動次數
  let interval = setInterval(() => {
    reels.forEach(reel => {
      reel.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    });
    spins--;
    if (spins <= 0) clearInterval(interval);
  }, 100);
}

// 每 30 秒自動轉一次
spin(); // 頁面一開始也自動轉
setInterval(spin, 30000);

</script>

</body>
</html>
